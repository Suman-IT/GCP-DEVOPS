name: Terraform Apply - Dev Environment

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/envs/dev/**'
      - 'terraform/envs/main.tf'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-apply-dev.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/envs/dev/**'
      - 'terraform/modules/**'
  workflow_dispatch:

env:
  TF_VERSION: 1.5.0
  TERRAFORM_DIR: terraform/envs/dev

jobs:
  plan:
    name: Terraform Plan - Dev
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -backend-config=backend-config.hcl

      - name: Terraform Format Check
        working-directory: terraform/envs
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform Plan - Dev
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan \
            -lock=false 2>&1 | tee plan.txt

      - name: Show Plan Details
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "=== Terraform Plan Output ===" 
          terraform show -no-color tfplan | tee -a plan.txt
          echo "\n=== Plan Summary ===" 
          terraform show -no-color tfplan | grep -E '(Plan:|No changes|Will be|Must be)' || true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan
          path: ${{ env.TERRAFORM_DIR }}/tfplan
          retention-days: 5

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TERRAFORM_DIR }}/plan.txt', 'utf8');
            const lines = planOutput.split('\n');
            const resources = lines.filter(l => /^(\s+\+|-|~|=>)/.test(l));
            const summary = lines.filter(l => /^Plan:|^No changes|^Terraform will|^(Apply|Destroy) complete/.test(l)).join('\n');
            
            let body = '## 📋 Terraform Plan - Dev Environment\n\n';
            if (summary) body += `### Summary\n\`\`\`\n${summary}\n\`\`\`\n\n`;
            if (resources.length > 0) {
              body += `### Resources (${resources.length})\n\`\`\`diff\n${resources.slice(0, 100).join('\n')}${resources.length > 100 ? '\n... ' + (resources.length - 100) + ' more resources' : ''}\n\`\`\`\n`;
            }
            body += '\n**Full plan output available in [workflow logs](${workflow_url})**';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  apply:
    name: Terraform Apply - Dev
    runs-on: ubuntu-latest
    
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -backend-config=backend-config.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: dev-tfplan
          path: ${{ env.TERRAFORM_DIR }}

      - name: Terraform Apply - Dev
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform output -json > outputs.json

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: dev-outputs
          path: ${{ env.TERRAFORM_DIR }}/outputs.json
          retention-days: 30

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [plan, apply]
    if: always()
    
    permissions:
      contents: read

    steps:
      - name: Job Status
        run: |
          echo "Plan Status: ${{ needs.plan.result }}"
          echo "Apply Status: ${{ needs.apply.result }}"
